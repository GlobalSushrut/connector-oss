# ── Publish Docker Image to Docker Hub + GHCR ────────────────────
# Triggered on release tag: v*
# Builds multi-arch image (amd64 + arm64), pushes to Docker Hub + GHCR
#
# Usage: docker run -p 8080:8080 -e DEEPSEEK_API_KEY=sk-... globalsushrut/connector-oss
#
# Required secrets:
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN   — Docker Hub access token
name: Publish Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            globalsushrut/connector-oss:latest
            globalsushrut/connector-oss:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Connector-OSS
            org.opencontainers.image.description=Tamper-proof memory, chain-of-custody, and OS-grade runtime for AI agents
            org.opencontainers.image.url=https://github.com/GlobalSushrut/connector-oss
            org.opencontainers.image.source=https://github.com/GlobalSushrut/connector-oss
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.licenses=Apache-2.0
