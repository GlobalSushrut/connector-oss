# ── Publish Python SDK to PyPI ────────────────────────────────────
# Triggered on release tag: v*
# Builds maturin wheels for Linux x86_64, uploads to PyPI
#
# Usage: pip install connector-oss
#
# Required secrets:
#   PYPI_API_TOKEN — PyPI API token (pypi.org → Account Settings → API Tokens)
name: Publish PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build wheel — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target ${{ matrix.target }} --out dist
        working-directory: sdks/python

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: sdks/python/dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist
        working-directory: sdks/python

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sdks/python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install maturin
        run: pip install maturin

      - name: Publish to PyPI
        run: maturin upload --non-interactive dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
