# ── Publish Python SDK to PyPI ────────────────────────────────────
# Triggered on release tag: v*
# Builds maturin wheels for 5 platforms, uploads to PyPI
#
# Usage: pip install connector-oss
#
# Required secrets:
#   PYPI_API_TOKEN — PyPI API token (pypi.org → Account Settings → API Tokens)
name: Publish PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build wheel — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path vac/crates/vac-ffi/Cargo.toml
          manylinux: auto
          working-directory: sdks/python

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: sdks/python/dist/*.whl

  # Pure Python sdist (no native code, for source builds)
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path vac/crates/vac-ffi/Cargo.toml
          working-directory: sdks/python

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sdks/python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
