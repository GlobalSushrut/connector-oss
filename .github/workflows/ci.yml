# ── Connector-OSS CI ─────────────────────────────────────────────
# Runs on every push/PR: test all 3 workspaces (1,857 tests)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - { name: connector, path: connector, tests: 1194 }
          - { name: vac, path: vac, tests: 492 }
          - { name: aapi, path: aapi, tests: 171 }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace.path }}

      - name: Run tests — ${{ matrix.workspace.name }}
        run: cargo test --workspace
        working-directory: ${{ matrix.workspace.path }}

  check-surfaces:
    name: Check surfaces
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo check — connector-server
        run: cargo check -p connector-server
        working-directory: connector

      - name: cargo check — vac-ffi
        run: cargo check -p vac-ffi
        working-directory: vac

      - name: cargo check — connector-napi
        run: cargo check
        working-directory: sdks/typescript/native

  typescript:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: sdks/typescript

      - name: TypeScript compile check
        run: npx tsc --noEmit
        working-directory: sdks/typescript
