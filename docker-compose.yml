services:
  connector:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CONNECTOR_LLM_PROVIDER=openai
      - CONNECTOR_LLM_MODEL=gpt-4o
      - CONNECTOR_LLM_API_KEY=${CONNECTOR_LLM_API_KEY}
      - CONNECTOR_ADDR=0.0.0.0:8080
      - RUST_LOG=info

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - connector

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=connector
    depends_on:
      - prometheus
