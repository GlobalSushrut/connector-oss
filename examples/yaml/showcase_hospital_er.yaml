# ═══════════════════════════════════════════════════════════════════════════════
# SHOWCASE: Production Hospital ER — 45 lines of YAML
# ═══════════════════════════════════════════════════════════════════════════════
#
# This is a PRODUCTION-GRADE multi-agent medical system.
# Compare: CrewAI needs 100+ lines of YAML + Python. OpenAI SDK needs 50+ lines Python.
# We do it in 45 lines of YAML. With CID, audit, MAC, trust scoring, HIPAA built in.
#
# Usage: export OPENAI_API_KEY=sk-... && connector run showcase_hospital_er.yaml

agents:
  triage: "You are an ER triage nurse. Assess symptoms, record vitals, assign urgency 1-5."
  doctor:
    instructions: "You are an ER attending physician. Review triage, diagnose, prescribe."
    tools: [ehr_lookup, lab_order]
  pharmacist: "You are a hospital pharmacist. Verify prescriptions for interactions and dosing."

flow: triage -> doctor -> pharmacist

knowledge:
  - "Aspirin is contraindicated with warfarin due to bleeding risk"
  - "Metformin requires renal function monitoring — check eGFR before prescribing"
  - "NSAIDs are contraindicated in patients with CKD stage 3+"
  - file: formulary.csv

tools:
  ehr_lookup: "Query patient electronic health record by MRN"
  lab_order: "Submit lab test order to the laboratory system"

memory: long
budget: "$10.00"
persist: true
trust: medical
observe: medical
think: deep
stream: true
firewall: hipaa
secure: hipaa
comply: [hipaa]
retry: 3
deny: ["export.*", "delete.*"]
