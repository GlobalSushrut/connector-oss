<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  
  <!-- Shield outline -->
  <path d="M 120 20 L 200 58 L 200 130 C 200 178 166 210 120 224 C 74 210 40 178 40 130 L 40 58 Z" fill="url(#g1l)" opacity="0.06"/>
  <path d="M 120 20 L 200 58 L 200 130 C 200 178 166 210 120 224 C 74 210 40 178 40 130 L 40 58 Z" fill="none" stroke="url(#g1l)" stroke-width="3.5"/>

  <!-- 3 stacked memory blocks -->
  <rect x="76" y="62" width="88" height="30" rx="6" fill="url(#g1l)"/>
  <rect x="76" y="100" width="88" height="30" rx="6" fill="url(#g1l)" opacity="0.7"/>
  <rect x="76" y="138" width="88" height="30" rx="6" fill="url(#g1l)" opacity="0.42"/>

  <!-- Chain links between blocks -->
  <circle cx="120" cy="96" r="5" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="120" cy="134" r="5" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Lock icon on top block -->
  <rect x="113" y="68" width="14" height="10" rx="2" fill="#fff"/>
  <path d="M 116 68 L 116 64 C 116 60 118 58 120 58 C 122 58 124 60 124 64 L 124 68" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- CID hash marks on blocks -->
  <line x1="82" y1="72" x2="108" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="78" x2="98" y2="78" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="110" x2="108" y2="110" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="116" x2="95" y2="116" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="148" x2="104" y2="148" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="154" x2="92" y2="154" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>

